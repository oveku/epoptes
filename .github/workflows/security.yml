name: Security Scans

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trufflehog:
    name: TruffleHog (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1.9.1
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=osv-results.sarif
            ./
      - name: Upload SARIF
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

  snyk:
    name: Snyk (open source + code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Snyk token
        id: token
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SNYK_TOKEN secret not set; skipping Snyk."
          fi
      - name: Setup Snyk CLI
        if: steps.token.outputs.present == 'true'
        uses: snyk/actions/setup@master
      - name: Snyk Open Source (Python)
        if: steps.token.outputs.present == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=api/requirements.txt --package-manager=pip --sarif-file-output=snyk-python.sarif
      - name: Snyk Open Source (Node)
        if: steps.token.outputs.present == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          cd web && npm install --package-lock-only --no-audit --no-fund
          cd .. && snyk test --file=web/package.json --sarif-file-output=snyk-node.sarif
      - name: Snyk Code (SAST)
        if: steps.token.outputs.present == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --sarif-file-output=snyk-code.sarif
      - name: Upload Snyk SARIF (python)
        if: always() && hashFiles('snyk-python.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-python.sarif
          category: snyk-python
      - name: Upload Snyk SARIF (node)
        if: always() && hashFiles('snyk-node.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-node.sarif
          category: snyk-node
      - name: Upload Snyk SARIF (code)
        if: always() && hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
